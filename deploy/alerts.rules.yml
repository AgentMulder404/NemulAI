groups:
  - name: nemulai_gpu
    rules:
      - alert: GPUThermalThrottle
        expr: nemulai_gpu_temperature_c > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "GPU {{ $labels.gpu_index }} temperature {{ $value }}°C"
          description: "GPU has been above 85°C for 5 minutes. Check cooling and workload."

      - alert: GPUIdleWaste
        expr: nemulai_gpu_utilization_pct < 5 and nemulai_gpu_power_watts > 50
        for: 15m
        labels:
          severity: info
        annotations:
          summary: "GPU {{ $labels.gpu_index }} idle but drawing {{ $value }}W"
          description: "GPU utilization below 5% for 15 minutes while drawing significant power. Consider suspending idle jobs."

      - alert: GPUHighPower
        expr: nemulai_gpu_power_watts > nemulai_gpu_power_watts * 0.95
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "GPU {{ $labels.gpu_index }} near power limit"
          description: "GPU running at >95% of power limit for 10 minutes. Performance may be throttled."

  - name: nemulai_agent
    rules:
      - alert: AgentDown
        expr: absent(nemulai_agent_uptime_seconds)
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "NemulAI agent unreachable"
          description: "No agent uptime metric scraped for 3 minutes. Agent may have crashed."

      - alert: WALBacklogCritical
        expr: nemulai_wal_entries_pending > 10000
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "WAL backlog at {{ $value }} entries"
          description: "Write-ahead log has over 10K pending entries for 10 minutes. API may be unreachable."

      - alert: UploadFailureRate
        expr: rate(nemulai_upload_failure_total[5m]) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High upload failure rate"
          description: "More than 0.5 upload failures per second for 5 minutes. Check API connectivity."

  - name: nemulai_attribution
    rules:
      - alert: HighAttributionUncertainty
        expr: avg(nemulai_attribution_uncertainty_pct) > 40
        for: 10m
        labels:
          severity: info
        annotations:
          summary: "Average attribution uncertainty at {{ $value }}%"
          description: "Attribution engine averaging >40% uncertainty. Consider adding job tags or scheduler integration."

      - alert: HighUnresolvedRate
        expr: rate(nemulai_attribution_unresolved_total[5m]) > 0.1
        for: 10m
        labels:
          severity: info
        annotations:
          summary: "High unresolved attribution rate"
          description: "Attribution engine failing to resolve jobs frequently. Check scheduler adapter and process tagging."
